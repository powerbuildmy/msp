<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSP - Molecular Science Products</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" href="/favicon.ico">
    <meta name="description" content="MSP high-performance lubrication solutions for industrial, marine, automotive applications across Southeast Asia.">
    <meta name="keywords" content="MSP, molecular science, lubricants, engine treatment, penetrating lubricant, EP grease, spray can">
    <meta name="author" content="MSP (Molecular Science Products Pte Ltd)">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #1e2a3e;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }
        .logo {
            max-width: 100%;
            width: 100%;
            height: auto;
            border-radius: 20px;
        }
        .nav-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e4e8;
            position: sticky;
            top: 0;
            background: #f5f7fa;
            z-index: 100;
        }
        .nav-tab {
            padding: 10px 24px;
            background: #eef2f6;
            border-radius: 40px;
            text-decoration: none;
            color: #1e2a3e;
            font-weight: 500;
            transition: 0.2s;
        }
        .nav-tab:hover, .nav-tab.active {
            background: #1a3a8f;
            color: white;
        }

        /* Fade transition for smoother navigation */
        .fade-out {
            opacity: 0;
            transition: opacity 0.12s ease;
        }
        
        .fade-in {
            opacity: 1;
            transition: opacity 0.12s ease;
        }

        .product-map-container {
            position: relative;
            display: inline-block;
            width: 100%;
            margin-bottom: 30px;
        }
        .product-range-image {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            display: block;
        }
        .product-hotspot {
            position: absolute;
            cursor: pointer;
            background: rgba(255,255,255,0);
            z-index: 2;
            transition: background 0.1s ease;
        }
        .hotspot-engine {
            left: 2%;
            top: 5%;
            width: 22%;
            height: 42%;
        }
        .hotspot-penlub {
            left: 26%;
            top: 5%;
            width: 22%;
            height: 42%;
        }
        .hotspot-grease {
            left: 50%;
            top: 5%;
            width: 22%;
            height: 42%;
        }
        .hotspot-fuel {
            left: 74%;
            top: 5%;
            width: 24%;
            height: 42%;
        }
        .product-hotspot:hover {
            background: rgba(26, 58, 143, 0.1);
            border-radius: 12px;
        }

        .second-image-container {
            position: relative;
            display: inline-block;
            width: 100%;
            margin-bottom: 30px;
        }
        .second-clickable-image {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            display: block;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .second-clickable-image:hover {
            transform: scale(1.01);
        }

        .contact-info {
            background: #0f2b6d;
            color: white;
            text-align: center;
            padding: 24px;
            border-radius: 24px;
            margin: 40px 0 20px;
        }
        .contact-info a { color: white; }
        .whatsapp-link {
            background: #25D366;
            padding: 6px 14px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: white;
            margin-left: 12px;
        }
        .footer {
            text-align: center;
            color: #6c7a8e;
            border-top: 1px solid #e2e8f0;
            padding: 20px;
        }
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25D366;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 16px rgba(0,0,0,0.2);
            transition: 0.2s;
            z-index: 9999;
        }
        .whatsapp-float:hover { transform: scale(1.08); }
        .whatsapp-float svg { fill: white; width: 34px; }
        .tooltip-text {
            position: absolute;
            right: 70px;
            background: #1e2a3e;
            color: white;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            white-space: nowrap;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }
        .whatsapp-float:hover .tooltip-text { opacity: 1; }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
            backdrop-filter: blur(6px);
        }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 28px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5);
            animation: bloom 0.45s cubic-bezier(0.34, 1.2, 0.64, 1);
            border: 2px solid rgba(255,255,255,0.2);
        }
        @keyframes bloom {
            0% { transform: scale(0.2) rotate(-2deg); opacity: 0; filter: blur(8px);}
            100% { transform: scale(1) rotate(0deg); opacity: 1; filter: blur(0);}
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .close-modal {
            position: absolute;
            top: 25px;
            right: 35px;
            color: white;
            font-size: 44px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1001;
            transition: 0.2s;
            background: rgba(0,0,0,0.4);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .close-modal:hover { background: #2a5bc5; transform: scale(1.05); color: white; }

        @media (max-width: 768px) {
            .nav-tabs { flex-direction: column; align-items: center; }
            .tooltip-text { display: none; }
            .close-modal { top: 15px; right: 20px; width: 40px; height: 40px; font-size: 34px;}
        }
    </style>
</head>
<body>
<div class="container">
    <div id="shared-header"></div>

    <div class="product-map-container">
        <img src="product range.webp" alt="MSP Product Range" class="product-range-image">
        <div class="product-hotspot hotspot-engine" id="engineHotspot" title="Engine Formulation (Metal Treatment)"></div>
        <div class="product-hotspot hotspot-penlub" id="penlubHotspot" title="Penetrating Lubricant"></div>
        <div class="product-hotspot hotspot-grease" id="greaseHotspot" title="EP-2 Grease"></div>
        <div class="product-hotspot hotspot-fuel" id="fuelHotspot" title="Fuel Conditioner"></div>
    </div>

    <div class="second-image-container">
        <img src="product/plsc.webp" alt="MSP Penetrating Lubricant Spray Can" class="second-clickable-image" id="sprayCanImage">
    </div>

    <div class="contact-info">
        <p><strong>Contact Us</strong><br>
        Email: <a href="mailto:admin@msp.com.sg">admin@msp.com.sg</a> | Tel: +65 6453 0800 | Mobile: +65 8661 3874
        <a href="https://wa.me/+6586613874?text=Hello%20MSP!" class="whatsapp-link" target="_blank">💬 WhatsApp</a>
        </p>
    </div>

    <div class="footer">
        &copy; 2025 Molecular Science Products Pte Ltd. All Rights Reserved.
    </div>
</div>

<a href="https://wa.me/6586613874?text=Hello%20MSP!" class="whatsapp-float" id="floatingWhatsApp" target="_blank">
    <svg viewBox="0 0 24 24"><path d="M12.032 2.002c-5.524 0-10 4.477-10 10 0 1.78.468 3.522 1.357 5.034l-1.448 5.29 5.424-1.422c1.477.877 3.144 1.342 4.876 1.342 5.523 0 10-4.477 10-10 0-5.523-4.477-10-10-10zM16.5 15.2c-.3.9-.9 1.5-1.6 1.7-.8.2-1.6.2-2.3-.1-.9-.3-1.7-.8-2.6-1.4-.8-.6-1.5-1.3-2-2.2-.4-.7-.7-1.5-.7-2.4 0-.9.3-1.7.9-2.4.3-.3.6-.5 1-.5h.4c.2 0 .4.1.5.3l.8 1.5c.1.2.1.4 0 .6l-.6.8c-.1.2-.2.3-.1.5.4.8 1.1 1.5 1.9 2 .1.1.3.1.5 0l.8-.6c.2-.2.5-.2.7 0l1.5.8c.2.1.3.3.3.5 0 .2 0 .4-.1.6z"/></svg>
    <span class="tooltip-text">Chat with us 💬</span>
</a>

<div id="imageModal" class="modal">
    <span class="close-modal">&times;</span>
    <img class="modal-content" id="modalImage" alt="MSP product flyer - detailed view">
</div>

<script>
    // Fade transition for navigation
    (function() {
        const allNavLinks = document.querySelectorAll('.nav-tab');
        const container = document.querySelector('.container');
        
        function handleNavClick(e) {
            const href = this.getAttribute('href');
            if (!href || href === '#') return;
            e.preventDefault();
            
            if (container) container.classList.add('fade-out');
            
            setTimeout(() => {
                window.location.href = href;
            }, 120);
        }
        
        allNavLinks.forEach(link => {
            link.addEventListener('click', handleNavClick);
        });
        
        if (container) {
            container.classList.add('fade-in');
            setTimeout(() => {
                container.classList.remove('fade-out');
            }, 50);
        }
    })();

    // Load shared header
    fetch('header.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('shared-header').innerHTML = data;
            const currentPage = window.location.pathname.split('/').pop() || 'product.html';
            document.querySelectorAll('#shared-header .nav-tab').forEach(tab => {
                if (tab.getAttribute('href') === currentPage) {
                    tab.classList.add('active');
                }
            });
        })
        .catch(err => console.error('Error loading header:', err));

    // Modal system
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    const closeModal = document.querySelector('.close-modal');
    
    function showFlyerWithBloom(imageUrl) {
        if (!modal || !modalImg) return;
        modalImg.src = imageUrl;
        modal.style.display = 'flex';
        modalImg.style.animation = 'none';
        modalImg.offsetHeight;
        modalImg.style.animation = 'bloom 0.45s cubic-bezier(0.34, 1.2, 0.64, 1)';
    }
    
    if (closeModal) {
        closeModal.onclick = () => {
            modal.style.display = 'none';
            if (modalImg) modalImg.style.animation = '';
        };
    }
    window.onclick = (e) => { 
        if (e.target === modal) {
            modal.style.display = 'none';
            if(modalImg) modalImg.style.animation = '';
        }
    };
    
    const engineHotspot = document.getElementById('engineHotspot');
    const penHotspot = document.getElementById('penlubHotspot');
    const greaseHotspot = document.getElementById('greaseHotspot');
    const fuelHotspot = document.getElementById('fuelHotspot');
    
    if (engineHotspot) {
        engineHotspot.addEventListener('click', (e) => {
            e.stopPropagation();
            showFlyerWithBloom('product/ef.webp');
        });
    }
    if (penHotspot) {
        penHotspot.addEventListener('click', (e) => {
            e.stopPropagation();
            showFlyerWithBloom('product/pl.webp');
        });
    }
    if (greaseHotspot) {
        greaseHotspot.addEventListener('click', (e) => {
            e.stopPropagation();
            showFlyerWithBloom('product/ep2.webp');
        });
    }
    if (fuelHotspot) {
        fuelHotspot.addEventListener('click', (e) => {
            e.stopPropagation();
            showFlyerWithBloom('product/fc.webp');
        });
    }
    
    const sprayCanImage = document.getElementById('sprayCanImage');
    if (sprayCanImage) {
        sprayCanImage.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            showFlyerWithBloom('product/penlub-spray-can.webp');
        });
    }
    
    const flyersToPreload = [
        'product/ef.webp',
        'product/pl.webp',
        'product/ep2.webp',
        'product/fc.webp',
        'product/penlub-spray-can.webp',
        'product/plsc.webp'
    ];
    flyersToPreload.forEach(src => {
        const img = new Image();
        img.src = src;
    });
    
    document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('floatingWhatsApp');
        if (btn) btn.style.display = 'flex';
    });
</script>
</body>
</html>
